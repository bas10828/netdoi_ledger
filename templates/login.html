<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เข้าสู่ระบบ — Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Sarabun", sans-serif;
    background: linear-gradient(135deg, #1e2a38 0%, #2c3e50 55%, #34495e 100%);
    display: flex; align-items: center; justify-content: center;
    height: 100vh; margin: 0;
  }
  .card {
    background: white; padding: 40px 36px; border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    width: 340px; max-width: 90vw;
  }
  @media (max-width: 480px) {
    body { height: auto; min-height: 100vh; padding: 24px 0; }
    .card { padding: 28px 22px; }
  }
  .badge {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, #3a6ea5, #2c3e50);
    margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 20px;
  }
  h1 { font-size: 19px; margin: 0 0 4px; color: #1c2833; text-align: center; font-weight: 700; }
  .subtitle { font-size: 12px; color: #97a3ad; text-align: center; margin-bottom: 26px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; font-weight: 500; }
  input {
    width: 100%; padding: 11px 14px; border: 1.5px solid #e1e5e9; border-radius: 8px;
    margin-bottom: 16px; font-family: inherit; font-size: 14px; transition: border-color .15s;
  }
  input:focus { outline: none; border-color: #3a6ea5; }
  button {
    width: 100%; padding: 12px; background: #2c3e50; color: white; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: background .15s;
  }
  button:hover { background: #1c2833; }
  .error {
    color: #c0392b; background: #fdecea; border-radius: 6px; padding: 8px 10px;
    font-size: 13px; margin-bottom: 14px; text-align: center;
  }
</style>
</head>
<body>
<form class="card" method="post" action="/login">
  <div class="badge">฿</div>
  <h1>บัญชีรายรับ-รายจ่าย</h1>
  <div class="subtitle">ledger.22422522.xyz</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <label>Username</label>
  <input name="username" required autofocus>
  <label>Password</label>
  <input name="password" type="password" required>
  <button type="submit">เข้าสู่ระบบ</button>
</form>
</body>
</html>

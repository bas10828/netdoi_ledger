services:
  dashboard:
    build: .
    container_name: netdoi_ledger_dashboard
    command: uvicorn dashboard:app --host 0.0.0.0 --port 8081
    env_file: .env
    volumes:
      - ./line_files:/app/line_files
    networks:
      - biw_net
    restart: unless-stopped

  webhook:
    build: .
    container_name: netdoi_ledger_webhook
    command: uvicorn webhook:app --host 0.0.0.0 --port 8000
    env_file: .env
    volumes:
      - ./line_files:/app/line_files
    networks:
      - biw_net
    restart: unless-stopped

networks:
  biw_net:
    external: true
